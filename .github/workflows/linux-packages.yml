name: Linux packages

# Builds the native Debian/RPM packages and attaches them to the GitHub Release.
# Runs when a Release is published; dispatch manually to (re)build for an existing
# tag — `ref` is the code to build from, `release_tag` the release to upload to.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from"
        required: false
        default: "main"
      release_tag:
        description: "Release tag to upload packages to"
        required: true

permissions:
  contents: write # upload release assets

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb
      - name: Build the .deb (release binaries + systemd service)
        run: cargo deb -p prismdb
      - name: Smoke-test (install, service starts, query over the wire)
        run: |
          set -x
          sudo apt-get install -y ./target/debian/prismdb_*.deb
          for b in prismd prism-shell prism-fsck prism-dump; do command -v "$b"; done
          sleep 3
          if ! systemctl is-active --quiet prismd; then
            sudo systemctl status prismd --no-pager || true
            sudo journalctl -u prismd --no-pager | tail -50 || true
            exit 1
          fi
          systemctl is-enabled prismd
          printf 'SHOW DATABASES\n\\quit\n' | prism-shell 127.0.0.1:4444 --user admin --password admin
      - name: Upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.release_tag }}"
          ls -l target/debian/
          gh release upload "$TAG" target/debian/*.deb --clobber

  rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-generate-rpm
      - name: Build release binaries
        run: cargo build --release -p prismdb
      - name: Strip binaries
        run: strip target/release/prismd target/release/prism-shell target/release/prism-fsck target/release/prism-dump
      - name: Build the .rpm
        run: cargo generate-rpm -p crates/prism-cli
      - name: Inspect the .rpm (files + systemd scriptlets)
        run: |
          sudo apt-get update && sudo apt-get install -y rpm
          ls -l target/generate-rpm/
          echo "--- files ---"; rpm -qlp target/generate-rpm/*.rpm
          echo "--- scriptlets ---"; rpm -qp --scripts target/generate-rpm/*.rpm
      - name: Upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.release_tag }}"
          gh release upload "$TAG" target/generate-rpm/*.rpm --clobber
