name: Publish Python SDK

# Publishes sdks/python (prismdb) to PyPI with the version in its pyproject.toml.
# Runs when a GitHub Release is published (bump the SDK version in
# sdks/python/pyproject.toml as part of cutting the release), and can be
# dispatched manually. Requires the PYPI_API_TOKEN secret.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to publish from"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test (no server needed)
        working-directory: sdks/python
        run: python -m unittest discover -s tests

      - name: Build sdist + wheel
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        working-directory: sdks/python
        run: python -m twine upload --non-interactive dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
