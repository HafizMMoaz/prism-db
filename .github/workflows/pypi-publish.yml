name: Publish Python SDK

# Publishes sdks/python (prismdb) to PyPI with the version in its pyproject.toml.
# Runs when a GitHub Release is published (bump the SDK version in
# sdks/python/pyproject.toml as part of cutting the release), and can be
# dispatched manually.
#
# Authentication is PyPI Trusted Publishing (OpenID Connect) - no API token. The
# matching publisher on PyPI must be configured as:
#   Owner=HafizMMoaz  Repository=prism-db  Workflow=pypi-publish.yml  Environment=pypi
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to publish from"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test (no server needed)
        working-directory: sdks/python
        run: python -m unittest discover -s tests

      - name: Build sdist + wheel
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist
