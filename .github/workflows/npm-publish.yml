name: Publish Node SDK

# Publishes sdks/node (@prismdb/client) to npm with the version in its
# package.json. Runs when a GitHub Release is published (bump the SDK version in
# sdks/node/package.json as part of cutting the release), and can be dispatched
# manually — e.g. to ship the SDK for the current main when a release tag predates
# a packaging fix.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to publish from"
        required: false
        default: "main"

permissions:
  contents: read
  id-token: write # npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          # Node 22+: `node --test` supports the glob in the package's test script
          # (added in Node 21). The published SDK still runs on Node >= 20.
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Build and test
        working-directory: sdks/node
        run: |
          npm ci
          npm run build
          npm test

      - name: Publish to npm
        working-directory: sdks/node
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
