# PrismDB server configuration (an environment file read by the systemd unit).
#
# Edit, then: sudo systemctl restart prismd

# Address the server listens on. Defaults to localhost only - the seeded
# admin/admin account is a development credential. To accept connections from
# other machines, change the host to 0.0.0.0 (and set up TLS + real accounts
# first): PRISM_BIND=0.0.0.0:4444
PRISM_BIND=127.0.0.1:4444

# Data directory. The systemd unit creates and owns /var/lib/prismdb.
PRISM_DATA_DIR=/var/lib/prismdb

# Log verbosity: error | warn | info | debug | trace. The `audit` target carries
# authentication and authorization events.
RUST_LOG=info

# TLS (optional). Point both at PEM files, then restart. Leave empty for plaintext.
# PRISM_TLS_CERT=/etc/prismdb/tls/cert.pem
# PRISM_TLS_KEY=/etc/prismdb/tls/key.pem
