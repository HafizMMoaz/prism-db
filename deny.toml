# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
# ignore = []   # add RUSTSEC ids here with a justification when unavoidable

[licenses]
version = 2
# Permissive licenses compatible with shipping Prism under Apache-2.0.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
# ring (rustls' crypto backend) ships an ISC LICENSE file, which cargo-deny
# detects confidently - no clarify or OpenSSL acceptance is needed.
confidence-threshold = 0.9

[bans]
# Deny multiple versions of the same crate to keep the tree lean; relax with a
# documented skip if a transitive dep forces a duplicate.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
